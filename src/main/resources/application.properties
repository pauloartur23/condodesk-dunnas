# Configurações do Servidor
server.port=8080
spring.application.name=CondoDesk

# Configurações de View (JSP)
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Configurações do Banco de Dados (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/condodesk
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# Mudamos para 'validate' para que o Hibernate não crie as tabelas sozinho.
# O Flyway fará esse trabalho.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=true

# Flyway - Gerenciamento de Versão do Banco
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Logs e Auditoria
logging.level.org.hibernate.SQL=DEBUG
logging.level.AUDITORIA=INFO